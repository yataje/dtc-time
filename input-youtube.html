<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DTC Sync Input</title>
<link rel="stylesheet" href="input.css">
</head>

<body>

<div class="container">

<h2>동기화 기준 입력</h2>

<div class="row">

<input type="number" id="year">
<label>년</label>

<input type="number" id="month">
<label>월</label>

<input type="number" id="day">
<label>일</label>

</div>

<div class="row">

<input type="number" id="hour">
<label>시</label>

<input type="number" id="minute">
<label>분</label>

</div>

<div class="row">

<select id="episode"></select>

</div>

<button id="saveBtn">저장</button>

<div id="status"></div>

</div>

<script type="module" src="input-youtube.js"></script>

</body>
</html>
