<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>DTC-TIME</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- B열 : 오늘 -->
  
  <!-- C열 -->
  <section class="episode-section">

  <div class="season-column">
    <div class="season-title">시즌1</div>
    <div class="season-buttons" id="season1"></div>
  </div>

  <div class="season-column">
    <div class="season-title">시즌2</div>
    <div class="season-buttons" id="season2"></div>
  </div>

  <div class="season-column">
    <div class="season-title">시즌3</div>
    <div class="season-buttons" id="season3"></div>
  </div>

  <div class="season-column">
    <div class="season-title">시즌4</div>
    <div class="season-buttons" id="season4"></div>
  </div>

</section>


  <!-- D열 -->
  <section class="result-section">
    <div id="resultArea"></div>
  </section>

  <!-- E열 -->
 
<div class="control-row">

  <select id="clockMode">
    <option value="12">12시간제</option>
    <option value="24">24시간제</option>
  </select>

  <select id="outputOrder">
    <option value="time-title">시간-제목</option>
    <option value="title-time">제목-시간</option>
  </select>

  <button id="copyBtn">복사</button>

</div>






</div>

<section class="next-section">
  <div id="nextBroadcast"></div>
  <button id="copyNextBtn">다음 방송일 복사</button>
</section>



<script type="module" src="script.js"></script>

<div id="buildVersion">APPALAN DTC-TIME v1.3</div>




<div class="base-title">동기화 기준 (시간표 오차가 5분을 넘지 않는다면 수정하지 마세요)</div>

  <!-- A열 : 절대 기준 -->
  <section class="base-section">

  <div class="base-input-group">
    
    <input type="number" id="baseYear" disabled>
    <label>년  </label>

    
    <input type="number" id="baseMonth" disabled>
    <label>월  </label>

    
    <input type="number" id="baseDay" disabled>
    <label>일  </label>
    

    <input type="number" id="baseHour" disabled>
    <label>시  </label>


    <input type="number" id="baseMinute" disabled>
    <label>분  </label>


    <select id="baseEpisodeSelect" disabled></select>
    <label>에피소드</label>
    <button id="editSyncBtn">수정</button>

  </div>
</section>
</div>


<div id="syncPopup" class="popup-overlay">
  <div class="popup-box">

    <div class="popup-title">동기화 시간 수정</div>

    <!-- ✅ 1행: 연/월/일 -->
    <div class="popup-row">
      <div class="popup-field">
        <label for="popupYear">연</label>
        <input type="number" id="popupYear">
      </div>

      <div class="popup-field">
        <label for="popupMonth">월</label>
        <input type="number" id="popupMonth">
      </div>

      <div class="popup-field">
        <label for="popupDay">일</label>
        <input type="number" id="popupDay">
      </div>
    </div>

    <!-- ✅ 2행: 시/분 -->
    <div class="popup-row">
      <div class="popup-field">
        <label for="popupHour">시</label>
        <input type="number" id="popupHour">
      </div>

      <div class="popup-field">
        <label for="popupMinute">분</label>
        <input type="number" id="popupMinute">
      </div>
    </div>

    <!-- ✅ 3행: 에피소드(한 줄 전체) -->
    <div class="popup-row">
      <div class="popup-field full">
        <label for="popupEpisode">에피소드</label>
        <select id="popupEpisode"></select>
      </div>
    </div>

    <!-- ✅ 4행: 취소/확인 -->
    <div class="popup-buttons">
      <button id="popupCancel">취소</button>
      <button id="popupSave">확인</button>
    </div>

  </div>
</div>



  

</body>
</html>
